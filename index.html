<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhật Ký của Bạn Đường</title>

<style>
body{
margin:0;
font-family: -apple-system, sans-serif;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.phone{
width:390px;
height:844px;
border-radius:40px;
overflow:hidden;
background:#fff;
position:relative;
}

/* LOCK SCREEN */
.lock{
position:absolute;
width:100%;
height:100%;
background:url('https://i.postimg.cc/YS48ChXC/ccacdc8e0192dd07df1e35fc1a397219.jpg') center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.pass{
display:flex;
gap:10px;
margin-bottom:20px;
}

.dot{
width:10px;height:10px;
border-radius:50%;
background:#fff;
opacity:0.3;
}

.dot.active{opacity:1;}

.keypad{
display:grid;
grid-template-columns:repeat(3,70px);
gap:10px;
}

.key{
background:rgba(255,255,255,0.2);
border-radius:50%;
height:70px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
}

/* APP */
.app{
display:none;
height:100%;
overflow:auto;
background:#faf2f0;
padding:20px;
}

/* HEADER */
.header{
display:flex;
gap:15px;
align-items:center;
}

.avatar{
width:96px;
height:96px;
border-radius:50%;
border:5px solid #fff;
background:#ccc;
overflow:hidden;
}

.avatar img{width:100%;height:100%;object-fit:cover;}

.bio{
font-size:18px;
}

/* CARDS */
.cards{
display:flex;
gap:12px;
margin-top:20px;
}

.card{
width:60px;
height:100px;
border-radius:16px;
background:#eee;
}

/* BUTTON */
.add{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#000;
color:#fff;
font-size:30px;
display:flex;
align-items:center;
justify-content:center;
}

/* NOTE */
.noteBtn{
position:fixed;
top:20px;
right:20px;
background:#fff;
padding:10px;
border-radius:10px;
}

textarea{
width:100%;
height:300px;
border:none;
outline:none;
font-size:16px;
background:transparent;
}
</style>
</head>

<body>

<div class="phone">

<!-- LOCK -->
<div class="lock" id="lock">
<div class="pass" id="dots">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<div class="keypad">
<div class="key">1</div>
<div class="key">2</div>
<div class="key">3</div>
<div class="key">4</div>
<div class="key">5</div>
<div class="key">6</div>
<div class="key">7</div>
<div class="key">8</div>
<div class="key">9</div>
</div>
</div>

<!-- APP -->
<div class="app" id="app">

<div class="header">
<div class="avatar" onclick="uploadAvatar()">
<img id="avatarImg">
</div>
<div class="bio">
“Viết những điều nhỏ bé ♡”
</div>
</div>

<div class="cards">
<div class="card"></div>
<div class="card"></div>
<div class="card"></div>
<div class="card"></div>
</div>

<textarea placeholder="Viết gì đó..."></textarea>

<div class="add" onclick="createBook()">+</div>

<div class="noteBtn" onclick="addNote()">📝</div>

</div>

</div>

<script>
let input="";
let pass="1234";

document.querySelectorAll(".key").forEach(k=>{
k.onclick=()=>{
input+=k.innerText;
updateDots();

if(input.length===4){
if(input===pass){
document.getElementById("lock").style.display="none";
document.getElementById("app").style.display="block";
}else{
input="";
updateDots();
alert("Sai mật khẩu rồi 😢");
}
}
}
})

function updateDots(){
let dots=document.querySelectorAll(".dot");
dots.forEach((d,i)=>{
d.classList.toggle("active",i<input.length);
})
}

function uploadAvatar(){
let i=document.createElement("input");
i.type="file";
i.onchange=e=>{
let file=e.target.files[0];
let url=URL.createObjectURL(file);
document.getElementById("avatarImg").src=url;
}
i.click();
}

function createBook(){
alert("Tạo sổ mới ✨ (bản demo)");
}

function addNote(){
let note=prompt("Viết note nè 💗");
if(note) alert("Đã lưu note: "+note);
}
</script>

</body>
</html>
